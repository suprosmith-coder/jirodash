<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jiro — Signing in…</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
<style>
  :root {
    --sky:   #d6eaf8;
    --navy:  #1a3a5c;
    --navy2: #2a527a;
    --blue:  #4a90d9;
    --blue2: #5ba3e8;
    --red:   #e05a6a;
    --green: #4caf82;
    --white: #ffffff;
    --border:#c5dff5;
    --font:      'Nunito', sans-serif;
    --font-head: 'Baloo 2', cursive;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--sky);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 15%, #ffffff60 0%, transparent 45%),
      radial-gradient(circle at 85% 85%, #b8d9f530 0%, transparent 45%);
    pointer-events: none;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    border: 2px solid var(--border);
    box-shadow: 0 8px 32px #4a90d930;
    padding: 48px 52px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: repeating-linear-gradient(90deg,
      #4a7fc1 0px, #4a7fc1 20px, #e8f0fa 20px, #e8f0fa 40px);
  }

  .icon-wrap {
    font-size: 52px;
    color: var(--blue);
    margin-bottom: 16px;
  }

  .icon-wrap.success { color: var(--green); }
  .icon-wrap.error   { color: var(--red); }

  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .title {
    font-family: var(--font-head);
    font-size: 24px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .sub {
    font-size: 14px;
    color: #7a9ab5;
    font-weight: 600;
    line-height: 1.6;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-top: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--blue2));
    border-radius: 99px;
    animation: progress 2s ease-in-out forwards;
  }

  @keyframes progress {
    0%   { width: 0%; }
    60%  { width: 80%; }
    100% { width: 95%; }
  }

  .progress-fill.done { width: 100% !important; animation: none; background: var(--green); transition: width .3s, background .3s; }
  .progress-fill.fail { width: 100% !important; animation: none; background: var(--red);   transition: width .3s, background .3s; }

  .btn-retry {
    display: inline-block;
    margin-top: 20px;
    background: #5865F2;
    color: #fff;
    border: none;
    padding: 11px 28px;
    border-radius: 12px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: background .2s, transform .2s;
    text-decoration: none;
  }
  .btn-retry:hover { background: #4752c4; transform: translateY(-1px); }
  .btn-retry { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap" id="icon"><i class="fas fa-circle-notch spin"></i></div>
  <div class="title" id="title">Signing you in…</div>
  <div class="sub"  id="sub">Verifying your Discord account. This only takes a moment.</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <a class="btn-retry" id="retry-btn" href="dashboard.html">
    <i class="fas fa-arrow-left"></i> Back to Login
  </a>
</div>

<script>
const EDGE_TOKEN_URL = 'https://hfxagwcwaalrmaqzhyfj.supabase.co/functions/v1/discord-oauth';
const DASHBOARD_URL  = window.location.href.replace('oauth-callback.html', 'dashboard.html');
const REDIRECT_URI   = window.location.origin + window.location.pathname;

function setError(msg) {
  document.getElementById('icon').className      = 'icon-wrap error';
  document.getElementById('icon').innerHTML      = '<i class="fas fa-times-circle"></i>';
  document.getElementById('title').textContent   = 'Sign-in Failed';
  document.getElementById('sub').textContent     = msg;
  document.getElementById('progress').className  = 'progress-fill fail';
  document.getElementById('retry-btn').style.display = 'inline-block';
}

function setSuccess() {
  document.getElementById('icon').className      = 'icon-wrap success';
  document.getElementById('icon').innerHTML      = '<i class="fas fa-check-circle"></i>';
  document.getElementById('title').textContent   = 'Signed in!';
  document.getElementById('sub').textContent     = 'Redirecting to your dashboard…';
  document.getElementById('progress').className  = 'progress-fill done';
}

(async () => {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');

  if (!code) {
    setError('No authorization code received from Discord.');
    return;
  }

  if (state && sessionStorage.getItem('oauth_state') !== state) {
    setError('State mismatch — possible CSRF attack. Please try logging in again.');
    return;
  }
  sessionStorage.removeItem('oauth_state');

  try {
    const res = await fetch(EDGE_TOKEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || `HTTP ${res.status}`);
    }

    const { access_token } = await res.json();
    if (!access_token) throw new Error('No access token returned from server.');

    sessionStorage.setItem('discord_token', access_token);
    setSuccess();

    setTimeout(() => { window.location.href = DASHBOARD_URL; }, 800);
  } catch (e) {
    setError('Login failed: ' + e.message);
  }
})();
</script>
</body>
</html>
